# Netlify configuration — ZVIG frontend hosting.
# Netlify auto-detects Next.js and uses its Next.js runtime (OpenNext adapter),
# which supports App Router, server components and API routes.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

# Set these in Netlify UI (Site settings -> Environment variables) instead of
# committing them:
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
# Server-only secrets (when the backend goes live):
#   SUPABASE_SERVICE_ROLE_KEY, STRIPE_SECRET_KEY, PAYNOW_INTEGRATION_KEY,
#   WHATSAPP_ACCESS_TOKEN, WHATSAPP_VERIFY_TOKEN
